<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>白話可轉債 - 隨堂測驗</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #2c3e50; color: white; padding: 20px; text-align: center; }
        h2 { color: #f1c40f; }
        .question { font-size: 20px; margin: 20px 0; color: #ecf0f1; font-weight: bold; line-height: 1.5; }
        .btn { 
            display: block; width: 100%; padding: 15px; margin: 10px 0; 
            font-size: 18px; color: white; background-color: #3498db; 
            border: none; border-radius: 8px; cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn:active { background-color: #2980b9; }
        #progress { margin-top: 10px; color: #bdc3c7; font-size: 14px; }
    </style>
</head>
<body>
    <h2>📝 白話可轉債 - 隨堂測驗</h2>
    <div id="progress">讀取題目中...</div>
    <div id="quiz-container"></div>

    <script>
        let questionBank = [];
        let currentQuestionIndex = 0;
        let totalScore = 0;

        const container = document.getElementById('quiz-container');
        const progress = document.getElementById('progress');

        // 接收 Python 傳過來的動態題庫密碼
        const urlParams = new URLSearchParams(window.location.search);
        const base64Data = urlParams.get('data');

        if (base64Data) {
            try {
                // 將密碼解碼還原成題目
                const binaryStr = atob(base64Data.replace(/-/g, '+').replace(/_/g, '/'));
                const bytes = new Uint8Array([...binaryStr].map(char => char.charCodeAt(0)));
                const decodedStr = new TextDecoder().decode(bytes);
                questionBank = JSON.parse(decodedStr);
            } catch (e) {
                progress.innerText = "題庫解析失敗，請通知管理員。";
                console.error(e);
            }
        } else {
            progress.innerText = "沒有收到題目資料！請從 Telegram 機器人開啟。";
        }

        function renderQuestion() {
            if (questionBank.length === 0) return;

            if (currentQuestionIndex >= questionBank.length) {
                container.innerHTML = "<h3 style='color:#2ecc71;'>🎉 測驗完成！計算成績中...</h3>";
                progress.innerText = "";
                // 傳送總分給 Telegram
                window.Telegram.WebApp.sendData(totalScore.toString());
                return;
            }

            const currentQ = questionBank[currentQuestionIndex];
            progress.innerText = `目前進度：第 ${currentQuestionIndex + 1} 題 / 共 ${questionBank.length} 題`;

            let html = `<div class="question">${currentQ.question}</div>`;
            currentQ.options.forEach(option => {
                html += `<button class="btn" onclick="selectAnswer(${option.score})">${option.text}</button>`;
            });
            container.innerHTML = html;
        }

        function selectAnswer(score) {
            totalScore += score;
            currentQuestionIndex++;
            renderQuestion();
        }

        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
        renderQuestion();
    </script>
</body>
</html>
