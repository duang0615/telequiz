<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全方位獵股雷達 - 隨堂測驗</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #2c3e50; color: white; padding: 20px; text-align: center; }
        .question { font-size: 20px; margin-bottom: 20px; color: #f1c40f; }
        .btn { 
            display: block; width: 100%; padding: 15px; margin: 10px 0; 
            font-size: 18px; color: white; background-color: #3498db; 
            border: none; border-radius: 8px; cursor: pointer;
        }
        .btn:active { background-color: #2980b9; }
    </style>
</head>
<body>
    <h2>📝 課後隨堂測驗</h2>
    
    <div id="quiz-container">
        <div class="question">Q: 請問「可轉債」的全名是什麼？</div>
        <button class="btn" onclick="submitScore(100)">可轉換公司債 (100分)</button>
        <button class="btn" onclick="submitScore(0)">可愛轉圈圈債券 (0分)</button>
        <button class="btn" onclick="submitScore(0)">可怕轉型債務 (0分)</button>
    </div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        function submitScore(score) {
            // 將分數轉換成字串，透過 Telegram 傳送給後端機器人
            window.Telegram.WebApp.sendData(score.toString());
        }
    </script>
</body>
</html>
